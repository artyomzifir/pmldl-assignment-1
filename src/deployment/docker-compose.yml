# code/deployment/docker-compose.yml
services:
  api:
    build:
      context: ./api
    container_name: mnist_api
    environment:
      MODEL_PATH: /models/mnist_cnn.pt
      METADATA_JSON: /data/processed/metadata.json
    volumes:
      - ../../models:/models:ro
      - ../../data:/data:ro
    ports:
      - "8001:8001"
    healthcheck:
      test: ["CMD", "curl", "-fsS", "http://localhost:8001/health"]
      interval: 10s
      timeout: 2s
      retries: 5
      start_period: 10s

  app:
    build:
      context: ./app
    container_name: mnist_app
    environment:
      API_URL: http://api:8001
    ports:
      - "8501:8501"
    depends_on:
      api:
        condition: service_healthy
